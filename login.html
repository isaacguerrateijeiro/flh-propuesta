<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso · Propuesta Farmacias Los Hidalgos</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700;1,9..144,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green-dark:  #0D5C3A;
    --green-mid:   #1A7A4F;
    --green-light: #2AA66C;
    --slate:       #1C2331;
    --slate-mid:   #3A4557;
    --border:      rgba(42,166,108,0.25);
    --white:       #FFFFFF;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--slate);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; right: -200px;
    width: 700px; height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(42,166,108,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -150px; left: -150px;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(242,131,26,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .stripe {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    width: 5px;
    background: linear-gradient(180deg, var(--green-light), #F2831A);
  }

  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 52px 48px;
    width: 100%;
    max-width: 420px;
    text-align: center;
    backdrop-filter: blur(8px);
    position: relative;
  }

  .logos {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    margin-bottom: 40px;
  }
  .logos img { display: block; }
  .logo-intermark { height: 22px; width: auto; }
  .logo-hidalgos  { height: 40px; width: auto; }
  .logo-sep {
    width: 1px;
    height: 36px;
    background: rgba(255,255,255,0.15);
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: rgba(42,166,108,0.12);
    border: 1px solid rgba(42,166,108,0.25);
    color: var(--green-light);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 40px;
    margin-bottom: 28px;
  }
  .badge::before { content: '●'; font-size: 7px; }

  h1 {
    font-family: 'Fraunces', serif;
    font-size: 30px;
    font-weight: 700;
    color: var(--white);
    line-height: 1.15;
    margin-bottom: 10px;
  }
  h1 em { font-style: italic; color: var(--green-light); }

  .subtitle {
    font-size: 14px;
    color: rgba(255,255,255,0.45);
    font-weight: 300;
    margin-bottom: 40px;
    line-height: 1.6;
  }

  .field {
    margin-bottom: 16px;
  }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-bottom: 10px;
    text-align: left;
  }

  .code-input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 18px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 28px;
    font-weight: 600;
    letter-spacing: 10px;
    color: var(--white);
    text-align: center;
    text-transform: uppercase;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    -webkit-appearance: none;
  }
  .code-input::placeholder {
    color: rgba(255,255,255,0.15);
    letter-spacing: 8px;
  }
  .code-input:focus {
    border-color: var(--green-light);
    background: rgba(42,166,108,0.06);
  }

  .error-msg {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.25);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    color: #FCA5A5;
    text-align: left;
    margin-bottom: 16px;
    animation: shake 0.35s ease;
  }
  .error-msg::before { content: '✕'; font-size: 11px; font-weight: 700; flex-shrink: 0; }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%       { transform: translateX(-6px); }
    40%       { transform: translateX(6px); }
    60%       { transform: translateX(-4px); }
    80%       { transform: translateX(4px); }
  }

  .btn {
    width: 100%;
    background: linear-gradient(135deg, var(--green-mid), var(--green-dark));
    border: none;
    border-radius: 12px;
    padding: 16px 24px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--white);
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 8px;
  }
  .btn:hover  { opacity: 0.9; }
  .btn:active { transform: scale(0.98); }

  .footer-note {
    margin-top: 32px;
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    line-height: 1.6;
  }

  @media (max-width: 480px) {
    .card { padding: 36px 24px; }
    h1 { font-size: 24px; }
    .code-input { font-size: 22px; letter-spacing: 8px; }
  }
</style>
</head>
<body>
<div class="stripe"></div>

<div class="card">
  <div class="logos">
    <img src="/assets/intermark_logo.png" class="logo-intermark" alt="Intermark Consumer Market">
    <div class="logo-sep"></div>
    <img src="/assets/hidalgos_logo.png" class="logo-hidalgos" alt="Farmacias Los Hidalgos">
  </div>

  <div class="badge">Documento confidencial</div>
  <h1>Acceso <em>privado</em></h1>
  <p class="subtitle">Introduce el código de acceso para visualizar la propuesta.</p>

  <form method="POST" action="/login">
    <div class="field">
      <label>Código de acceso</label>

      <div class="error-msg" id="error-msg" style="display:none">Código incorrecto. Inténtalo de nuevo.</div>

      <input
        class="code-input"
        type="text"
        name="code"
        maxlength="6"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="characters"
        spellcheck="false"
        placeholder="······"
        autofocus
      >
    </div>
    <button class="btn" type="submit">Acceder →</button>
  </form>

  <p class="footer-note">Documento propiedad de Intermark IT 96 S.L. · Uso exclusivo Farmacias Los Hidalgos</p>
</div>

<script>
  const input  = document.querySelector('.code-input');
  const errMsg = document.getElementById('error-msg');

  if (new URLSearchParams(window.location.search).get('error')) {
    errMsg.style.display = 'flex';
    input.focus();
  }

  input.addEventListener('input', () => {
    input.value = input.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
  });
</script>
</body>
</html>
